# Reinforcement Learning Agent Configuration
algorithm: "ppo"
policy: "MlpPolicy"
learning_rate: 0.0003
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
clip_range_vf: null
normalize_advantage: true
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
total_timesteps: 100000
eval_freq: 5000
n_eval_episodes: 10
save_freq: 10000
log_interval: 10
policy_kwargs:
  net_arch: [256, 256]
  activation_fn: "tanh"
